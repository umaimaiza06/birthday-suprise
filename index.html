<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Ennjelieka ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
overflow-x:hidden;
min-height:100vh;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
text-align:center;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#start{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#start h1{
font-size:45px;
color:white;
text-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
background:white;
box-shadow:0 0 15px rgba(255,255,255,.8);
}

#content{
display:none;
padding:40px 20px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.title{
font-size:50px;
color:white;
margin-bottom:20px;
text-shadow:2px 2px 10px black;
}

.subtitle{
font-size:24px;
color:white;
margin-bottom:30px;
}

img{
width:320px;
max-width:90%;
border-radius:20px;
margin:15px;
box-shadow:0 0 20px rgba(255,255,255,0.9);
}

.message{
max-width:800px;
margin:auto;
margin-top:30px;
background:rgba(255,255,255,.9);
padding:30px;
border-radius:25px;
font-size:22px;
line-height:1.8;
min-height:250px;
}

.flower{
position:fixed;
top:-50px;
font-size:28px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}
}

.star{
position:fixed;
color:white;
font-size:18px;
animation:blink 2s infinite;
pointer-events:none;
}

@keyframes blink{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

.confetti{
position:fixed;
font-size:25px;
animation:burst 4s linear forwards;
pointer-events:none;
}

@keyframes burst{
0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}
}

audio{
margin-top:30px;
}

</style>
</head>

<body>

<div id="start">

<h1>🎁 A Special Gift For You 🎁</h1>

<button onclick="openGift()">
Open Gift ❤️
</button>

</div>

<div id="content">

<h1 class="title">🎂 Happy Birthday Ennjelieka 🎂</h1>

<p class="subtitle">
May all your dreams come true ❤️
</p>

<img src="gambar.jpg">

<img src="gambar2.jpg">

<div class="message">
<p id="typing"></p>
</div>

<audio id="music" controls loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function openGift(){

document.getElementById("start").style.display="none";

document.getElementById("content").style.display="block";

document.getElementById("music").play();

createConfetti();

typeMessage();

}

const text=`

Dear Ennjelieka ❤️

Happy Birthday to you.

Thank you for being part of my life.

I hope your special day is filled with happiness,
love and beautiful memories.

May every dream that you wish for come true.

Keep smiling because your smile
can brighten someone's day.

Enjoy your special day and always remember
that you are truly special.

Happy Birthday once again 🎂❤️

`;

let i=0;

function typeMessage(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typeMessage,40);

}

}

for(let x=0;x<40;x++){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=
(5+Math.random()*8)+"s";

flower.style.fontSize=
(20+Math.random()*20)+"px";

document.body.appendChild(flower);

}

for(let x=0;x<25;x++){

let star=document.createElement("div");

star.className="star";

star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

function createConfetti(){

for(let i=0;i<60;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=["🎉","🎊","✨","🌸"][Math.floor(Math.random()*4)];

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
